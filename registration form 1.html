<!DOCTYPE html>
<html>
<head>
  <title>Register Form</title>

  <style>
    body {
      background-color: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .form-box {
      width: 350px;
      background: white;
      padding: 20px;
      margin: 50px auto;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    label {
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"],
    input[type="tel"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .gender {
      margin-bottom: 15px;
    }

    input[type="submit"] {
      width: 100%;
      background-color: #4CAF50;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #45a049;
    }
  </style>
</head>

<body>

  <div class="form-box">
    <h2>Register</h2>

    <form>
      <label>First Name</label>
      <input type="text">

      <label>Last Name</label>
      <input type="text">

      <label>Email</label>
      <input type="email">

      <label>Password</label>
      <input type="password">

      <label>Date of Birth</label>
      <input type="date">

      <label>Gender</label>
      <div class="gender">
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
      </div>

      <label>Contact Number</label>
      <input type="tel">

      <input type="submit" value="Register">
    </form>
  </div>

</body>
</html>
